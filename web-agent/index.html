<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nexus Code</title>
<meta name="description" content="Nexus Code by Al-Sharqawi Tech, LLC" />

<link rel="manifest" href="/manifest.json" />
<link rel="icon" type="image/png" href="/icons/icon-32.png" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<meta name="theme-color" content="#4f46e5" />

<!-- Add-to-home-screen: launches full-screen without Safari chrome -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Nexus Code" />
<meta name="application-name" content="Nexus Code" />
<style>
  :root {
    --bg: #ffffff;
    --bg-panel: #f7f7f8;
    --bg-panel-alt: #ececef;
    --bg-input: #f2f2f4;
    --border: rgba(15, 15, 20, 0.09);
    --border-strong: rgba(15, 15, 20, 0.16);
    --text: #1c1c22;
    --text-muted: #6c6c78;
    --accent-blue: #4f46e5;
    --accent-blue-ink: #ffffff;
    --accent-orange: #b45309;
    --accent-green: #15803d;
    --accent-red: #dc2626;
    --accent-yellow: #92640a;
    --shadow: 0 12px 30px -14px rgba(20, 20, 30, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Tahoma", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  a { color: var(--accent-blue); }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg-panel) 90%, transparent);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  header .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); flex-shrink: 0;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-green) 20%, transparent);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
  header .sub { font-size: 12px; color: var(--text-muted); margin-inline-start: auto; direction: ltr; text-align: left; font-family: ui-monospace, monospace; }

  /* ---- message column ---- */
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .column {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg { max-width: 88%; line-height: 1.7; font-size: 15.5px; }
  .msg.user {
    align-self: flex-end;
    background: var(--accent-blue);
    color: var(--accent-blue-ink);
    padding: 11px 15px;
    border-radius: 18px 18px 4px 18px;
    font-weight: 500;
    box-shadow: var(--shadow);
  }
  .msg.assistant {
    align-self: flex-start;
    color: var(--text);
    max-width: 96%;
  }
  .msg.assistant p { margin: 0 0 10px; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant ul { margin: 6px 0 10px; padding-inline-start: 22px; }
  .msg.assistant li { margin: 3px 0; }
  .msg.assistant h3, .msg.assistant h4 { margin: 14px 0 6px; font-weight: 700; }
  .msg.assistant .inline-code {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    background: var(--bg-panel-alt);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 6px;
    font-size: 0.9em;
    direction: ltr;
    unicode-bidi: embed;
  }
  .msg.assistant .code-block {
    direction: ltr;
    text-align: left;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg.assistant .code-block code { white-space: pre; }

  .msg.note { align-self: center; color: var(--accent-yellow); font-size: 13px; background: rgba(245,204,79,0.08); border: 1px solid rgba(245,204,79,0.25); padding: 6px 14px; border-radius: 20px; }
  .msg.error { align-self: center; color: var(--accent-red); font-size: 13px; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); padding: 6px 14px; border-radius: 20px; }

  .attach-thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; direction: ltr; }
  .attach-thumb { width: 52px; height: 52px; border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; }
  .attach-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .attach-thumb.file { font-size: 9px; color: var(--accent-blue-ink); text-align: center; padding: 4px; font-weight: 700; }

  .tool-log {
    align-self: flex-start;
    direction: ltr;
    text-align: left;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    color: var(--accent-orange);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .tool-log .args { color: var(--text-muted); }

  /* ---- confirm card ---- */
  .card {
    align-self: stretch;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    direction: ltr;
    text-align: left;
    box-shadow: var(--shadow);
  }
  .card .card-head {
    padding: 10px 14px;
    background: var(--bg-panel-alt);
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    color: var(--accent-orange);
    border-bottom: 1px solid var(--border);
  }
  .card .card-body {
    padding: 12px 14px;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.6;
    max-height: 340px;
    overflow: auto;
  }
  .diff-row { white-space: pre-wrap; word-break: break-word; }
  .diff-row.add { color: var(--accent-green); }
  .diff-row.remove { color: var(--accent-red); }
  .diff-row.context { color: var(--text-muted); }
  .cmd-line { color: var(--accent-yellow); }

  .card .card-actions { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); }
  .card .card-actions button {
    flex: 1;
    padding: 10px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-approve { background: var(--accent-green); color: #ffffff; border-color: var(--accent-green); }
  .btn-deny { background: transparent; color: var(--accent-red); }
  .card .card-actions button:disabled { opacity: 0.5; cursor: default; }
  .card .card-actions button:focus-visible, footer button:focus-visible, footer textarea:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }

  /* ---- typing indicator ---- */
  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 6px 2px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
  @media (prefers-reduced-motion: reduce) {
    .typing span { animation: none; opacity: 0.6; }
  }

  /* ---- footer / composer ---- */
  footer {
    flex-shrink: 0;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding: 8px 14px calc(14px + env(safe-area-inset-bottom));
  }
  .composer-wrap { max-width: 760px; margin: 0 auto; }

  .pending-attachments {
    display: flex;
    gap: 8px;
    padding: 0 4px 8px;
    direction: ltr;
  }
  .pending-thumb {
    position: relative;
    width: 52px; height: 52px;
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-panel-alt);
    border: 1px solid var(--border);
  }
  .pending-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pending-thumb .filelabel { font-size: 8.5px; color: var(--text-muted); text-align: center; padding: 4px 2px; word-break: break-all; }
  .pending-thumb .remove {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent-red); color: #fff;
    border: none; font-size: 11px; line-height: 16px; text-align: center; padding: 0; cursor: pointer;
  }

  .composer {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    background: var(--bg-input);
    border: 1px solid var(--border-strong);
    border-radius: 26px;
    padding: 6px 6px 6px 10px;
    box-shadow: var(--shadow);
  }
  .icon-btn {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--bg-panel-alt);
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--border-strong); color: var(--text); }
  .icon-btn:disabled { opacity: 0.4; cursor: default; }
  .icon-btn svg { width: 18px; height: 18px; }

  .composer textarea {
    flex: 1;
    resize: none;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 9px 4px;
    font-size: 16px;
    font-family: inherit;
    max-height: 140px;
    line-height: 1.4;
  }
  .composer textarea:focus { outline: none; }
  .composer textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent-blue);
    color: var(--accent-blue-ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s, transform 0.1s;
  }
  .send-btn:active:not(:disabled) { transform: scale(0.93); }
  .send-btn:disabled { background: var(--bg-panel-alt); color: var(--text-muted); opacity: 1; cursor: default; }
  .send-btn svg { width: 17px; height: 17px; transform: rotate(-90deg); }

  /* ---- token gate ---- */
  .gate {
    position: fixed; inset: 0;
    background: rgba(10, 11, 18, 0.92);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 10;
  }
  .gate-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 26px;
    max-width: 340px;
    width: 100%;
    box-shadow: var(--shadow);
  }
  .gate-card h2 { font-size: 17px; margin: 0 0 2px; }
  .gate-card .gate-brand { font-size: 12px; color: var(--accent-blue); font-weight: 600; margin: 0 0 14px; letter-spacing: 0.02em; }
  .gate-card p { font-size: 13.5px; color: var(--text-muted); margin: 0 0 16px; line-height: 1.6; }
  .gate-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 16px;
    margin-bottom: 12px;
    direction: ltr;
  }
  .gate-card input:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
  .gate-card button {
    width: 100%;
    background: var(--accent-blue);
    color: var(--accent-blue-ink);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-weight: 700;
    font-size: 14.5px;
    cursor: pointer;
  }

  /* ---- chat drawer ---- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(10, 10, 16, 0.35);
    z-index: 8;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; bottom: 0; right: 0;
    width: min(82vw, 320px);
    background: var(--bg);
    border-left: 1px solid var(--border);
    z-index: 9;
    display: flex;
    flex-direction: column;
    box-shadow: -18px 0 40px -20px rgba(0,0,0,0.25);
    padding-top: env(safe-area-inset-top);
    transform: translateX(100%);
    transition: transform 0.22s ease;
  }
  .drawer.open { transform: translateX(0); }
  @media (prefers-reduced-motion: reduce) {
    .drawer, .drawer-backdrop { transition: none; }
  }
  .drawer-head { padding: 14px; border-bottom: 1px solid var(--border); }
  .new-chat-btn {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent-blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 11px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .new-chat-btn svg { width: 17px; height: 17px; }
  .drawer-list { flex: 1; overflow-y: auto; padding: 8px; }
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 2px;
  }
  .drawer-item:hover { background: var(--bg-panel-alt); }
  .drawer-item.active { background: var(--bg-panel-alt); }
  .drawer-item .title {
    flex: 1;
    font-size: 13.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-item .del {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
  }
  .drawer-item .del:hover { background: rgba(220,38,38,0.12); color: var(--accent-red); }
</style>
</head>
<body>

  <div class="gate" id="gate">
    <div class="gate-card">
      <h2>Nexus Code</h2>
      <p class="gate-brand">Al-Sharqawi Tech, LLC</p>
      <p>أدخل كلمة المرور (Access Token) اللي ضبطتها في متغيّر البيئة <code>AGENT_ACCESS_TOKEN</code> على Vercel.</p>
      <input type="password" id="gate-input" placeholder="Access token" autocomplete="off" />
      <button id="gate-submit">دخول</button>
    </div>
  </div>

  <header>
    <button class="icon-btn" id="menu-btn" type="button" aria-label="المحادثات">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="14" y2="17"/></svg>
    </button>
    <span class="dot"></span>
    <h1>Nexus Code</h1>
    <span class="sub" id="header-sub">Al-Sharqawi Tech</span>
  </header>

  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <button class="new-chat-btn" id="new-chat-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        محادثة جديدة
      </button>
    </div>
    <div class="drawer-list" id="drawer-list"></div>
  </aside>

  <main id="chat-scroll"><div class="column" id="chat"></div></main>

  <footer>
    <div class="composer-wrap">
      <div class="pending-attachments" id="pending-attachments" hidden></div>
      <div class="composer">
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif,application/pdf" multiple hidden />
        <button class="icon-btn" id="attach-btn" type="button" aria-label="إرفاق ملف">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a1.5 1.5 0 0 1-2.12-2.12l8.49-8.48"/></svg>
        </button>
        <textarea id="input" rows="1" placeholder="اكتب طلبك..." disabled></textarea>
        <button class="send-btn" id="send" disabled aria-label="إرسال">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>
  </footer>

<script>
(function () {
  'use strict';

  var MAX_ATTACHMENTS = 3;
  var MAX_FILE_BYTES = 4 * 1024 * 1024;
  var ALLOWED_TYPES = ['image/png', 'image/jpeg', 'image/webp', 'image/gif', 'application/pdf'];

  var CHATS_KEY = 'nexusChats';

  var state = {
    token: localStorage.getItem('codeAgentToken') || '',
    history: [],
    busy: false,
    pendingAttachments: [], // {mediaType, data, name, isImage}
    chats: [],
    activeChatId: null,
  };

  var chatEl = document.getElementById('chat');
  var chatScroll = document.getElementById('chat-scroll');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var attachBtn = document.getElementById('attach-btn');
  var fileInput = document.getElementById('file-input');
  var pendingWrap = document.getElementById('pending-attachments');
  var gateEl = document.getElementById('gate');
  var gateInput = document.getElementById('gate-input');
  var gateSubmit = document.getElementById('gate-submit');
  var menuBtn = document.getElementById('menu-btn');
  var drawerEl = document.getElementById('drawer');
  var drawerBackdrop = document.getElementById('drawer-backdrop');
  var drawerList = document.getElementById('drawer-list');
  var newChatBtn = document.getElementById('new-chat-btn');

  function el(tag, opts) {
    opts = opts || {};
    var node = document.createElement(tag);
    if (opts.className) node.className = opts.className;
    if (opts.text !== undefined) node.textContent = opts.text;
    return node;
  }

  function scrollToBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  // ---- chat persistence (localStorage) + multiple conversations ----

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function loadChatsFromStorage() {
    try {
      var raw = localStorage.getItem(CHATS_KEY);
      var parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }

  function saveChatsToStorage() {
    try {
      localStorage.setItem(CHATS_KEY, JSON.stringify(state.chats));
    } catch (err) {
      // Most likely quota exceeded (attachments push chats past ~5MB fast).
      addNote('تعذّر حفظ المحادثة محليًا (المساحة ممتلئة) — احذف محادثات قديمة من القائمة الجانبية.', true);
    }
  }

  function getActiveChat() {
    for (var i = 0; i < state.chats.length; i++) {
      if (state.chats[i].id === state.activeChatId) return state.chats[i];
    }
    return null;
  }

  function deriveTitle(history) {
    for (var i = 0; i < history.length; i++) {
      var msg = history[i];
      if (msg.role !== 'user') continue;
      if (typeof msg.content === 'string' && msg.content.trim()) {
        return msg.content.trim().slice(0, 42);
      }
      if (Array.isArray(msg.content)) {
        var textBlock = msg.content.find(function (b) { return b.type === 'text' && b.text && b.text.trim(); });
        if (textBlock) return textBlock.text.trim().slice(0, 42);
        var hasImage = msg.content.some(function (b) { return b.type === 'image' || b.type === 'document'; });
        if (hasImage) return '📎 مرفق';
      }
    }
    return 'محادثة جديدة';
  }

  function persistActiveChat() {
    var chat = getActiveChat();
    if (!chat) return;
    chat.history = state.history;
    chat.updatedAt = Date.now();
    if (chat.title === 'محادثة جديدة') chat.title = deriveTitle(state.history);
    saveChatsToStorage();
    renderDrawerList();
  }

  function sortedChats() {
    return state.chats.slice().sort(function (a, b) { return b.updatedAt - a.updatedAt; });
  }

  function renderDrawerList() {
    drawerList.innerHTML = '';
    sortedChats().forEach(function (chat) {
      var item = el('div', { className: 'drawer-item' + (chat.id === state.activeChatId ? ' active' : '') });
      item.appendChild(el('span', { className: 'title', text: chat.title || 'محادثة جديدة' }));
      var delBtn = el('button', { className: 'del', text: '×' });
      delBtn.setAttribute('aria-label', 'حذف المحادثة');
      delBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        deleteChat(chat.id);
      });
      item.appendChild(delBtn);
      item.addEventListener('click', function () { switchToChat(chat.id); });
      drawerList.appendChild(item);
    });
  }

  /** Rebuilds the visible chat log from a saved Anthropic message history. */
  function renderHistoryIntoChat(history) {
    chatEl.innerHTML = '';
    history.forEach(function (msg) {
      if (msg.role === 'user') {
        if (typeof msg.content === 'string') {
          if (msg.content.trim()) addUser(msg.content, []);
          return;
        }
        if (Array.isArray(msg.content)) {
          var text = msg.content.filter(function (b) { return b.type === 'text'; }).map(function (b) { return b.text; }).join('\n');
          var atts = msg.content
            .filter(function (b) { return b.type === 'image'; })
            .map(function (b) { return { isImage: true, mediaType: b.source.media_type, data: b.source.data }; });
          if (text || atts.length) addUser(text, atts);
        }
        return;
      }
      if (msg.role === 'assistant' && Array.isArray(msg.content)) {
        var t = msg.content.filter(function (b) { return b.type === 'text'; }).map(function (b) { return b.text; }).join('\n');
        if (t.trim()) addAssistant(t);
      }
    });
    scrollToBottom();
  }

  function switchToChat(id) {
    var chat = null;
    for (var i = 0; i < state.chats.length; i++) {
      if (state.chats[i].id === id) chat = state.chats[i];
    }
    if (!chat) return;
    state.activeChatId = id;
    state.history = chat.history || [];
    state.pendingAttachments = [];
    renderPendingAttachments();
    renderHistoryIntoChat(state.history);
    renderDrawerList();
    closeDrawer();
  }

  function createNewChat() {
    var chat = { id: genId(), title: 'محادثة جديدة', updatedAt: Date.now(), history: [] };
    state.chats.unshift(chat);
    state.activeChatId = chat.id;
    state.history = [];
    state.pendingAttachments = [];
    renderPendingAttachments();
    saveChatsToStorage();
    chatEl.innerHTML = '';
    renderDrawerList();
    closeDrawer();
  }

  function deleteChat(id) {
    state.chats = state.chats.filter(function (c) { return c.id !== id; });
    if (state.activeChatId === id) {
      if (state.chats.length) {
        switchToChat(sortedChats()[0].id);
      } else {
        createNewChat();
      }
    }
    saveChatsToStorage();
    renderDrawerList();
  }

  function initChats() {
    state.chats = loadChatsFromStorage();
    if (!state.chats.length) {
      state.chats = [{ id: genId(), title: 'محادثة جديدة', updatedAt: Date.now(), history: [] }];
      saveChatsToStorage();
    }
    var active = sortedChats()[0];
    state.activeChatId = active.id;
    state.history = active.history || [];
    renderHistoryIntoChat(state.history);
    renderDrawerList();
  }

  function openDrawer() {
    drawerEl.classList.add('open');
    drawerBackdrop.classList.add('open');
  }
  function closeDrawer() {
    drawerEl.classList.remove('open');
    drawerBackdrop.classList.remove('open');
  }

  // ---- minimal markdown renderer (escapes first, only emits our own tags) ----
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderMarkdown(raw) {
    var blocks = [];
    var text = raw.replace(/```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g, function (_, lang, code) {
      var idx = blocks.length;
      blocks.push('<pre class="code-block"><code>' + escapeHtml(code.replace(/\n$/, '')) + '</code></pre>');
      return '' + idx + '';
    });

    text = escapeHtml(text);
    text = text.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/^### (.+)$/gm, '<h4>$1</h4>');
    text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/(^|\n)[-*] (.+)/g, '$1<li>$2</li>');
    text = text.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, function (m) { return '<ul>' + m + '</ul>'; });
    text = text.split(/\n{2,}/).map(function (para) {
      if (/^<(ul|h3|h4)/.test(para.trim())) return para;
      return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
    }).join('');

    text = text.replace(/(\d+)/g, function (_, idx) { return blocks[Number(idx)]; });
    return text;
  }

  function addUser(text, attachments) {
    var m = el('div', { className: 'msg user' });
    if (text) m.appendChild(document.createTextNode(text));
    if (attachments && attachments.length) {
      var thumbs = el('div', { className: 'attach-thumbs' });
      attachments.forEach(function (a) {
        var t = el('div', { className: 'attach-thumb' + (a.isImage ? '' : ' file') });
        if (a.isImage) {
          var img = document.createElement('img');
          img.src = 'data:' + a.mediaType + ';base64,' + a.data;
          t.appendChild(img);
        } else {
          t.textContent = 'PDF';
        }
        thumbs.appendChild(t);
      });
      m.appendChild(thumbs);
    }
    chatEl.appendChild(m);
    scrollToBottom();
  }

  function addAssistant(text) {
    var m = el('div', { className: 'msg assistant' });
    m.innerHTML = renderMarkdown(text || '(بدون رد نصي)');
    chatEl.appendChild(m);
    scrollToBottom();
  }

  function addNote(text, isError) {
    var m = el('div', { className: 'msg ' + (isError ? 'error' : 'note'), text: text });
    chatEl.appendChild(m);
    scrollToBottom();
  }

  function addToolLog(name, input) {
    var m = el('div', { className: 'tool-log' });
    m.appendChild(document.createTextNode('⏺ ' + name));
    var args = el('span', { className: 'args', text: JSON.stringify(input) });
    m.appendChild(args);
    chatEl.appendChild(m);
    scrollToBottom();
  }

  var typingEl = null;
  function showTyping() {
    typingEl = el('div', { className: 'typing' });
    typingEl.appendChild(el('span'));
    typingEl.appendChild(el('span'));
    typingEl.appendChild(el('span'));
    chatEl.appendChild(typingEl);
    scrollToBottom();
  }
  function hideTyping() {
    if (typingEl && typingEl.parentNode) typingEl.parentNode.removeChild(typingEl);
    typingEl = null;
  }

  function diffLines(oldStr, newStr) {
    var a = (oldStr || '').split('\n');
    var b = (newStr || '').split('\n');
    var n = a.length, m = b.length;

    if (n > 1500 || m > 1500) {
      var out = [{ type: 'context', text: '[الملف كبير جدًا لعرض diff كامل — عرض المحتوى الجديد فقط]' }];
      for (var k = 0; k < b.length; k++) out.push({ type: 'add', text: b[k] });
      return out;
    }

    var dp = new Array(n + 1);
    for (var i = 0; i <= n; i++) dp[i] = new Uint32Array(m + 1);
    for (i = n - 1; i >= 0; i--) {
      for (var j = m - 1; j >= 0; j--) {
        dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
      }
    }

    var result = [];
    i = 0; j = 0;
    while (i < n && j < m) {
      if (a[i] === b[j]) { result.push({ type: 'context', text: a[i] }); i++; j++; }
      else if (dp[i + 1][j] >= dp[i][j + 1]) { result.push({ type: 'remove', text: a[i] }); i++; }
      else { result.push({ type: 'add', text: b[j] }); j++; }
    }
    while (i < n) { result.push({ type: 'remove', text: a[i] }); i++; }
    while (j < m) { result.push({ type: 'add', text: b[j] }); j++; }
    return result;
  }

  function addConfirmCard(pending) {
    var card = el('div', { className: 'card' });
    var head = el('div', { className: 'card-head' });
    var body = el('div', { className: 'card-body' });

    if (pending.preview.kind === 'diff') {
      head.textContent = pending.toolName + '  ' + pending.preview.path;
      var rows = diffLines(pending.preview.oldContent, pending.preview.newContent);
      var capped = rows.slice(0, 400);
      capped.forEach(function (r) {
        var prefix = r.type === 'add' ? '+ ' : r.type === 'remove' ? '- ' : '  ';
        body.appendChild(el('div', { className: 'diff-row ' + r.type, text: prefix + r.text }));
      });
      if (rows.length > 400) body.appendChild(el('div', { className: 'diff-row context', text: '[...' + (rows.length - 400) + ' سطر إضافي]' }));
    } else if (pending.preview.kind === 'command') {
      head.textContent = 'run_command';
      body.appendChild(el('div', { className: 'cmd-line', text: '$ ' + pending.preview.command }));
    } else {
      head.textContent = pending.toolName;
      body.appendChild(el('div', { className: 'diff-row context', text: JSON.stringify(pending.input) }));
    }

    var actions = el('div', { className: 'card-actions' });
    var approveBtn = el('button', { className: 'btn-approve', text: 'موافقة وتنفيذ' });
    var denyBtn = el('button', { className: 'btn-deny', text: 'رفض' });
    actions.appendChild(approveBtn);
    actions.appendChild(denyBtn);

    card.appendChild(head);
    card.appendChild(body);
    card.appendChild(actions);
    chatEl.appendChild(card);
    scrollToBottom();

    function decide(approved) {
      approveBtn.disabled = true;
      denyBtn.disabled = true;
      resume(pending, approved);
    }
    approveBtn.addEventListener('click', function () { decide(true); });
    denyBtn.addEventListener('click', function () { decide(false); });
  }

  function setBusy(busy) {
    state.busy = busy;
    inputEl.disabled = busy || !state.token;
    attachBtn.disabled = busy || !state.token;
    updateSendState();
  }

  function updateSendState() {
    var hasContent = inputEl.value.trim().length > 0 || state.pendingAttachments.length > 0;
    sendBtn.disabled = state.busy || !state.token || !hasContent;
  }

  async function callApi(payload) {
    var res = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + state.token },
      body: JSON.stringify(payload),
    });
    var data = await res.json().catch(function () { return { error: 'استجابة غير صالحة من الخادم.' }; });
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    return data;
  }

  function handleResult(data) {
    state.history = data.history || state.history;
    persistActiveChat();
    if (data.status === 'confirm_required') {
      addToolLog(data.toolName, data.input);
      addConfirmCard(data);
      return;
    }
    addAssistant(data.reply);
  }

  async function send(text) {
    var attachmentsForSend = state.pendingAttachments.map(function (a) {
      return { mediaType: a.mediaType, data: a.data };
    });
    var attachmentsForDisplay = state.pendingAttachments.slice();
    state.pendingAttachments = [];
    renderPendingAttachments();

    setBusy(true);
    addUser(text, attachmentsForDisplay);
    showTyping();
    try {
      var payload = { message: text, history: state.history };
      if (attachmentsForSend.length) payload.attachments = attachmentsForSend;
      var data = await callApi(payload);
      hideTyping();
      handleResult(data);
    } catch (err) {
      hideTyping();
      addNote(err.message, true);
    } finally {
      setBusy(false);
      inputEl.focus();
    }
  }

  async function resume(pending, approved) {
    setBusy(true);
    showTyping();
    try {
      var data = await callApi({
        history: state.history,
        resume: {
          toolUseId: pending.toolUseId,
          toolName: pending.toolName,
          input: pending.input,
          approved: approved,
          pendingBlocks: pending.pendingBlocks,
          completedResults: pending.completedResults,
        },
      });
      hideTyping();
      addNote(approved ? 'تم التنفيذ.' : 'تم الرفض.', false);
      handleResult(data);
    } catch (err) {
      hideTyping();
      addNote(err.message, true);
    } finally {
      setBusy(false);
    }
  }

  // ---- attachments ----
  function renderPendingAttachments() {
    pendingWrap.innerHTML = '';
    pendingWrap.hidden = !state.pendingAttachments.length;
    updateSendState();
    state.pendingAttachments.forEach(function (a, idx) {
      var thumb = el('div', { className: 'pending-thumb' });
      if (a.isImage) {
        var img = document.createElement('img');
        img.src = 'data:' + a.mediaType + ';base64,' + a.data;
        thumb.appendChild(img);
      } else {
        thumb.appendChild(el('div', { className: 'filelabel', text: a.name || 'PDF' }));
      }
      var removeBtn = el('button', { className: 'remove', text: '×' });
      removeBtn.addEventListener('click', function () {
        state.pendingAttachments.splice(idx, 1);
        renderPendingAttachments();
      });
      thumb.appendChild(removeBtn);
      pendingWrap.appendChild(thumb);
    });
  }

  function readFileAsBase64(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var result = reader.result; // "data:<type>;base64,<data>"
        var commaIdx = result.indexOf(',');
        resolve(result.slice(commaIdx + 1));
      };
      reader.onerror = function () { reject(new Error('تعذّرت قراءة الملف.')); };
      reader.readAsDataURL(file);
    });
  }

  attachBtn.addEventListener('click', function () { fileInput.click(); });

  fileInput.addEventListener('change', async function () {
    var files = Array.prototype.slice.call(fileInput.files || []);
    fileInput.value = '';

    for (var idx = 0; idx < files.length; idx++) {
      var file = files[idx];
      if (state.pendingAttachments.length >= MAX_ATTACHMENTS) {
        addNote('أقصى عدد مرفقات لكل رسالة هو ' + MAX_ATTACHMENTS + '.', true);
        break;
      }
      if (ALLOWED_TYPES.indexOf(file.type) === -1) {
        addNote('نوع الملف غير مدعوم: ' + file.name + ' (فقط صور PNG/JPEG/WEBP/GIF أو PDF).', true);
        continue;
      }
      if (file.size > MAX_FILE_BYTES) {
        addNote('الملف كبير جدًا: ' + file.name + ' (الحد الأقصى 4MB).', true);
        continue;
      }
      try {
        var data = await readFileAsBase64(file);
        state.pendingAttachments.push({
          mediaType: file.type,
          data: data,
          name: file.name,
          isImage: file.type.indexOf('image/') === 0,
        });
      } catch (err) {
        addNote(err.message, true);
      }
    }
    renderPendingAttachments();
  });

  sendBtn.addEventListener('click', function () {
    var text = inputEl.value.trim();
    if ((!text && !state.pendingAttachments.length) || state.busy) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    send(text);
  });

  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  inputEl.addEventListener('input', function () {
    updateSendState();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  function unlock() {
    gateEl.style.display = 'none';
    setBusy(false);
    inputEl.focus();
  }

  gateSubmit.addEventListener('click', function () {
    var val = gateInput.value.trim();
    if (!val) return;
    state.token = val;
    localStorage.setItem('codeAgentToken', val);
    unlock();
  });
  gateInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') gateSubmit.click();
  });

  menuBtn.addEventListener('click', openDrawer);
  drawerBackdrop.addEventListener('click', closeDrawer);
  newChatBtn.addEventListener('click', createNewChat);

  initChats();

  if (state.token) {
    unlock();
  } else {
    setBusy(true);
  }
})();
</script>
</body>
